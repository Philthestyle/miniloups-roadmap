<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MiniLoups — Roadmap Submit App Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:   #FF86B6;
    --orange: #FFA94D;
    --yellow: #FFD43B;
    --green:  #6EDC9B;
    --blue:   #4D96FF;
    --violet: #B78BFF;
    --cream:  #FFF7ED;
    --ink:    #1F2937;
    --muted:  #6B7280;
    --line:   rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: linear-gradient(135deg, #FFF7ED 0%, #FFE9F1 60%, #EEE5FF 100%);
    color: var(--ink);
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 32px 40px 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 20px;
  }
  h1 {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800; font-size: 44px;
    margin: 0;
    background: linear-gradient(90deg, var(--pink), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .sub { color: var(--muted); font-weight: 600; margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .stat {
    background: #fff; border-radius: 14px; padding: 10px 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    font-weight: 700; display: flex; gap: 8px; align-items: center;
  }
  .stat .dot { width: 10px; height: 10px; border-radius: 50%; }
  .stat.todo .dot { background: var(--muted); }
  .stat.doing .dot { background: var(--blue); }
  .stat.blocked .dot { background: var(--orange); }
  .stat.done .dot { background: var(--green); }
  .stat.submit .dot { background: var(--pink); }
  .refresh-btn {
    background: linear-gradient(90deg, var(--pink), var(--violet));
    color: #fff; border: 0; border-radius: 14px; padding: 10px 18px;
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 700; font-size: 15px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(255,134,182,0.35);
  }
  .refresh-btn:hover { transform: translateY(-1px); }

  /* --- View mode selector --- */
  .view-selector {
    display: flex; gap: 6px; padding: 8px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--line);
    border-radius: 16px;
    backdrop-filter: blur(10px);
  }
  .view-selector button {
    border: 0; background: transparent; cursor: pointer;
    padding: 8px 16px; border-radius: 12px;
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 700; font-size: 13px; color: var(--muted);
    transition: all 0.2s ease;
  }
  .view-selector button:hover { background: rgba(255,134,182,0.10); color: var(--ink); }
  .view-selector button.active {
    background: linear-gradient(90deg, var(--pink), var(--violet));
    color: #fff;
    box-shadow: 0 4px 12px rgba(183,139,255,0.30);
  }

  /* --- Kanban board (status view) --- */
  .board {
    display: grid;
    grid-template-columns: repeat(5, minmax(240px, 1fr));
    gap: 14px;
    padding: 16px 24px 40px 24px;
  }
  .col {
    background: rgba(255,255,255,0.75);
    border-radius: 20px;
    padding: 14px;
    min-height: 400px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    border: 1px solid var(--line);
  }
  .col.submit {
    background: linear-gradient(160deg, #FF86B6 0%, #B78BFF 100%);
    color: #fff;
  }
  .col.submit .col-title,
  .col.submit .card,
  .col.submit .count-pill { color: #fff; }
  .col.submit .card {
    background: rgba(255,255,255,0.16);
    border-color: rgba(255,255,255,0.25);
  }
  .col.submit .card .desc { color: rgba(255,255,255,0.85); }
  .col.submit .card .tag { background: rgba(255,255,255,0.22); color: #fff; }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 6px 12px 6px;
  }
  .col-title {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800; font-size: 15px;
    letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--ink);
  }
  .count-pill {
    background: rgba(0,0,0,0.06); padding: 2px 10px;
    border-radius: 999px; font-weight: 700; font-size: 12px;
    color: var(--ink);
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid var(--line);
    box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    transition: transform 0.15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .card .head {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 6px;
  }
  .card .title {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 700; font-size: 15px; line-height: 1.2;
    flex: 1;
  }
  .card .slice {
    font-size: 11px; padding: 2px 8px;
    background: var(--yellow); color: var(--ink);
    border-radius: 999px; font-weight: 700;
    flex-shrink: 0;
  }
  .card .desc {
    font-size: 13px; color: var(--muted);
    margin: 4px 0 8px 0; line-height: 1.4;
  }
  .card .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .card .tag {
    font-size: 11px; padding: 2px 8px;
    background: rgba(0,0,0,0.06); border-radius: 999px;
    color: var(--muted); font-weight: 600;
  }
  .card .tag.critical { background: rgba(255,134,182,0.20); color: #C2185B; }
  .card .tag.legal { background: rgba(183,139,255,0.20); color: #6A1B9A; }
  .card .tag.money { background: rgba(255,169,77,0.25); color: #B45309; }
  .card .tag.growth { background: rgba(110,220,155,0.30); color: #1B5E20; }
  .card .tag.done-check { background: var(--green); color: #fff; }
  .card .meta {
    display: flex; align-items: center; gap: 6px;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed rgba(0,0,0,0.08);
    font-size: 11px; color: var(--muted); font-weight: 700;
  }
  .card .meta .sess {
    background: linear-gradient(90deg, rgba(255,134,182,0.20), rgba(183,139,255,0.20));
    color: #6A1B9A;
    padding: 2px 8px; border-radius: 999px; font-weight: 800;
  }
  .card .meta .dates { flex: 1; color: var(--muted); }
  .card .meta .dates .arrow { color: rgba(0,0,0,0.25); margin: 0 4px; }
  .card .meta .dates .started { color: var(--blue); }
  .card .meta .dates .delivered { color: #1B5E20; }
  .col.submit .card .meta {
    border-top-color: rgba(255,255,255,0.20);
    color: rgba(255,255,255,0.75);
  }
  .col.submit .card .meta .sess {
    background: rgba(255,255,255,0.22); color: #fff;
  }

  /* --- Grouped views (Session / Theme) --- */
  .grouped {
    padding: 16px 40px 40px 40px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .group-card {
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    transition: box-shadow 0.2s ease;
  }
  .group-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.08); }
  .group-header {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px; cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
  }
  .group-header:hover { background: rgba(255,134,182,0.05); }
  .group-header .chev {
    width: 20px; text-align: center;
    color: var(--muted); font-size: 14px;
    transition: transform 0.2s ease;
  }
  .group-card.open .group-header .chev { transform: rotate(90deg); }
  .group-header .badge-emoji {
    font-size: 32px; line-height: 1;
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(255,134,182,0.15), rgba(183,139,255,0.15));
    border-radius: 14px;
  }
  .group-header .title-block { flex: 1; }
  .group-header .title-block .code {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800; font-size: 20px;
    color: var(--ink); letter-spacing: -0.3px;
  }
  .group-header .title-block .subtitle {
    color: var(--muted); font-weight: 600; font-size: 13px;
    margin-top: 2px;
  }
  .group-header .stats-row {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .group-header .stats-row .pill {
    background: rgba(0,0,0,0.06); padding: 4px 12px;
    border-radius: 999px; font-weight: 700; font-size: 12px;
    color: var(--muted);
  }
  .group-header .stats-row .pill.count {
    background: linear-gradient(90deg, var(--green), var(--blue));
    color: #fff;
  }
  .group-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .group-card.open .group-body { max-height: 8000px; }
  .group-body-inner { padding: 0 24px 20px 24px; }
  .group-body h4 {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800; font-size: 14px;
    margin: 16px 0 8px; padding-top: 8px;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px;
    border-top: 1px dashed rgba(0,0,0,0.06);
    display: flex; align-items: center; gap: 8px;
  }
  .group-body h4:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
  .group-body h4 .h4-icon { font-size: 16px; }
  .group-body h4 .h4-count {
    background: rgba(0,0,0,0.06);
    padding: 2px 10px; border-radius: 999px;
    font-size: 11px; color: var(--muted); margin-left: 4px;
  }
  .item-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }
  .item {
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .item .col-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 6px;
  }
  .item .col-dot.done { background: var(--green); }
  .item .col-dot.doing { background: var(--blue); }
  .item .col-dot.todo { background: var(--muted); }
  .item .col-dot.blocked { background: var(--orange); }
  .item .col-dot.submit { background: var(--pink); }
  .item .item-body { flex: 1; min-width: 0; }
  .item .item-title {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 700; font-size: 13px; color: var(--ink); line-height: 1.3;
  }
  .item .item-slice {
    display: inline-block;
    font-size: 10px; padding: 1px 6px;
    background: var(--yellow); color: var(--ink);
    border-radius: 999px; font-weight: 700;
    margin-right: 6px;
  }
  .item .item-desc {
    font-size: 11px; color: var(--muted);
    margin-top: 4px; line-height: 1.4;
  }
  .item .item-meta {
    font-size: 10px; color: var(--muted); margin-top: 4px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .item .item-meta .mp {
    padding: 1px 6px; border-radius: 999px;
    background: rgba(0,0,0,0.05); font-weight: 600;
  }
  .item .item-meta .mp.session {
    background: linear-gradient(90deg, rgba(255,134,182,0.15), rgba(183,139,255,0.15));
    color: #6A1B9A; font-weight: 700;
  }

  footer {
    text-align: center; padding: 20px;
    color: var(--muted); font-size: 12px;
  }
  .progress-bar {
    background: rgba(0,0,0,0.06); height: 10px; border-radius: 999px;
    overflow: hidden; margin: 8px 0 0 0; width: 100%;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), var(--blue));
    transition: width 0.5s ease;
  }
  .kpi-strip {
    display: flex; gap: 12px; align-items: center;
    padding: 8px 40px 0 40px; flex-wrap: wrap;
  }
  .kpi-strip .kpi {
    font-size: 12px; color: var(--muted); font-weight: 700;
  }
  /* --- Current session hero --- */
  .current-hero {
    margin: 20px 40px 0;
    background: linear-gradient(135deg, rgba(255,134,182,0.12), rgba(183,139,255,0.12), rgba(77,150,255,0.10));
    border: 1px solid rgba(183,139,255,0.20);
    border-radius: 22px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
  }
  .current-hero .live-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(110,220,155,0.7);
    animation: pulse 2s infinite;
    margin-left: 4px;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(110,220,155,0.7); }
    70%  { box-shadow: 0 0 0 12px rgba(110,220,155,0); }
    100% { box-shadow: 0 0 0 0 rgba(110,220,155,0); }
  }
  .current-hero .hero-emoji {
    font-size: 44px; line-height: 1;
    width: 68px; height: 68px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--pink), var(--violet));
    border-radius: 18px; color: #fff;
    box-shadow: 0 8px 20px rgba(183,139,255,0.30);
  }
  .current-hero .hero-body { min-width: 0; }
  .current-hero .hero-eyebrow {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; letter-spacing: 0.8px; text-transform: uppercase;
    font-weight: 800; color: #6A1B9A;
  }
  .current-hero .hero-title {
    font-family: 'Baloo 2', system-ui, sans-serif;
    font-weight: 800; font-size: 24px; margin: 4px 0 6px;
    letter-spacing: -0.3px;
  }
  .current-hero .hero-sub { color: var(--muted); font-weight: 600; font-size: 13px; }
  .current-hero .hero-chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }
  .current-hero .hero-chips .chip {
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink);
  }
  .current-hero .hero-chips .chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .current-hero .hero-chips .chip .dot.doing { background: var(--blue); }
  .current-hero .hero-chips .chip .dot.todo  { background: var(--muted); }
  .current-hero .hero-stats {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    font-family: 'Baloo 2'; font-weight: 800;
  }
  .current-hero .hero-stats .big {
    font-size: 40px; line-height: 1;
    background: linear-gradient(135deg, var(--pink), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .current-hero .hero-stats .lbl {
    font-family: 'Nunito'; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  @media (max-width: 720px) {
    .current-hero { grid-template-columns: 1fr; text-align: center; }
    .current-hero .hero-stats { align-items: center; }
  }

  /* --- Session recap blocks (testable / shipped / screenshots) --- */
  .recap-blocks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 0 0 8px;
  }
  @media (max-width: 720px) {
    .recap-blocks { grid-template-columns: 1fr; }
  }
  .recap-block {
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 16px;
  }
  .recap-block .rb-title {
    font-family: 'Baloo 2'; font-weight: 800; font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .recap-block.testable { background: linear-gradient(135deg, rgba(77,150,255,0.08), rgba(110,220,155,0.06)); border-color: rgba(77,150,255,0.18); }
  .recap-block.testable .rb-title { color: #1E40AF; }
  .recap-block.shipped  { background: linear-gradient(135deg, rgba(110,220,155,0.10), rgba(255,212,59,0.08)); border-color: rgba(110,220,155,0.20); }
  .recap-block.shipped  .rb-title { color: #1B5E20; }
  .recap-block ul { margin: 0; padding-left: 20px; font-size: 13px; color: #374151; line-height: 1.5; }
  .recap-block ul li { margin: 3px 0; }
  .recap-block p { margin: 0; font-size: 13px; color: #374151; line-height: 1.5; }

  .screenshots-strip {
    display: flex; gap: 12px; overflow-x: auto;
    padding: 8px 4px; margin: 8px 0 0;
    scroll-snap-type: x mandatory;
  }
  .screenshots-strip::-webkit-scrollbar { height: 8px; }
  .screenshots-strip::-webkit-scrollbar-thumb { background: rgba(183,139,255,0.3); border-radius: 4px; }
  .screenshots-strip .shot {
    flex: 0 0 auto; scroll-snap-align: start;
    width: 180px; text-align: center;
  }
  .screenshots-strip .shot img {
    width: 100%; height: 320px; object-fit: cover;
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
    transition: transform 0.2s ease;
    cursor: zoom-in;
    background: #fff;
  }
  .screenshots-strip .shot img:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,0.18); }
  .screenshots-strip .shot .cap {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    font-weight: 700;
  }

  /* Lightbox for full-size screenshot */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,17,26,0.85);
    z-index: 999;
    align-items: center; justify-content: center;
    padding: 40px;
    backdrop-filter: blur(20px);
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .lightbox .close {
    position: absolute; top: 20px; right: 24px;
    background: rgba(255,255,255,0.15); color: #fff;
    border: 0; width: 44px; height: 44px; border-radius: 22px;
    font-size: 20px; cursor: pointer; font-weight: 700;
  }

  @media (max-width: 1200px) { .board { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px) { .board { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <div>
    <h1>MiniLoups — Submit Roadmap 🎈</h1>
    <div class="sub">Chemin complet jusqu'à l'App Store</div>
  </div>
  <div class="toolbar">
    <div class="stat todo"><span class="dot"></span><span id="count-todo">–</span> TODO</div>
    <div class="stat doing"><span class="dot"></span><span id="count-doing">–</span> DOING</div>
    <div class="stat blocked"><span class="dot"></span><span id="count-blocked">–</span> BLOCKED</div>
    <div class="stat done"><span class="dot"></span><span id="count-done">–</span> DONE</div>
    <button class="refresh-btn" onclick="location.reload()">🔄 Recharger</button>
  </div>
</header>

<div class="kpi-strip">
  <div class="kpi" id="progress-label">Progression globale : – %</div>
  <div style="flex:1"></div>
  <div class="kpi">Généré : <span id="gen-date">–</span></div>
</div>
<div style="padding: 0 40px;">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div id="current-hero-slot"></div>

<div style="padding: 20px 40px 0 40px; display: flex; justify-content: center;">
  <div class="view-selector">
    <button data-view="session" class="active">📅 Par session</button>
    <button data-view="theme">🎨 Par thème</button>
    <button data-view="status">🎯 Par statut</button>
  </div>
</div>

<div id="view-container"></div>

<div class="lightbox" id="lightbox">
  <button class="close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<footer>
  Fais tourner <code>sh scripts/refresh-roadmap.sh</code> pour régénérer la roadmap depuis le code.<br/>
  Fichier : <code>roadmap/index.html</code>
</footer>

<script>
// =========================================================================
// SESSIONS — dates historiques dérivées de git log --all --pretty=format
// =========================================================================
const SESSIONS = {
  1: {
    code: 'S01', date: '2026-07-02', label: 'Kickoff',
    desc: 'Scaffolding projet + première tranche onboarding',
    testable: [

    { col: 'submit', slice: '🎯', title: 'Build TestFlight validé (beta 2 semaines)', desc: 'Zero crash, feedback positif ≥ 80%', tags: [] },
    { col: 'submit', slice: '🎯', title: 'Privacy Policy + Terms LIVE sur miniloups.app', desc: 'URLs publiques accessibles', tags: [] },
    { col: 'submit', slice: '🎯', title: 'Submit for Review (App Store Connect)', desc: 'Attendre 24-48h review. Prêt à répondre si rejection.', tags: [] },
    { col: 'submit', slice: '🎉', title: 'LAUNCH DAY — Manual Release', desc: 'Contrôle la date pour aligner avec ads + PR + Product Hunt', tags: [] },
  ]
};

// =========================================================================
// COMMON HELPERS
// =========================================================================
function metaFor(card) {
  return CARD_META[card.title] || null;
}

function formatDateFR(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

function cardMetaHTML(card) {
  const meta = metaFor(card);
  if (!meta) return '';
  const sess = meta.session ? SESSIONS[meta.session] : null;
  const dates = [];
  if (meta.started) dates.push(`<span class="started">${formatDateFR(meta.started)}</span>`);
  if (meta.started && meta.delivered) dates.push(`<span class="arrow">→</span>`);
  if (meta.delivered) dates.push(`<span class="delivered">✓ ${formatDateFR(meta.delivered)}</span>`);
  if (!meta.started && !meta.delivered) return '';
  const sessPill = sess ? `<span class="sess">${sess.code}</span>` : '';
  return `<div class="meta">${sessPill}<span class="dates">${dates.join(' ')}</span></div>`;
}

function cardHTML(c) {
  const tags = (c.tags || []).map(t => `<span class="tag ${t}">${t}</span>`).join('');
  const desc = c.desc ? `<div class="desc">${c.desc}</div>` : '';
  const slice = c.slice ? `<div class="slice">${c.slice}</div>` : '';
  return `
    <div class="card">
      <div class="head">
        <div class="title">${c.title}</div>
        ${slice}
      </div>
      ${desc}
      ${tags ? `<div class="tags">${tags}</div>` : ''}
      ${cardMetaHTML(c)}
    </div>
  `;
}

// =========================================================================
// VIEW BY STATUS (kanban original)
// =========================================================================
function renderByStatus() {
  const container = document.getElementById('view-container');
  container.innerHTML = `<div class="board" id="board"></div>`;
  const board = document.getElementById('board');
  DATA.columns.forEach(col => {
    const cards = DATA.cards.filter(c => c.col === col.key);
    const el = document.createElement('div');
    el.className = 'col ' + col.key;
    el.innerHTML = `
      <div class="col-header">
        <div class="col-title">${col.title}</div>
        <div class="count-pill">${cards.length}</div>
      </div>
      ${cards.map(cardHTML).join('')}
    `;
    board.appendChild(el);
  });
}

// =========================================================================
// VIEW BY SESSION (grouped collapsible)
// =========================================================================
function itemHTML(card, showSession = false) {
  const meta = metaFor(card);
  const sess = meta && meta.session ? SESSIONS[meta.session] : null;
  const th = meta && meta.theme ? THEMES[meta.theme] : null;
  const bits = [];
  if (showSession && sess) bits.push(`<span class="mp session">${sess.code} · ${formatDateFR(sess.date)}</span>`);
  if (th) bits.push(`<span class="mp">${th.icon} ${th.label}</span>`);
  if (meta && meta.delivered && !showSession) bits.push(`<span class="mp">✓ ${formatDateFR(meta.delivered)}</span>`);
  if (meta && meta.started && !meta.delivered) bits.push(`<span class="mp">▶ ${formatDateFR(meta.started)}</span>`);
  const metaLine = bits.length ? `<div class="item-meta">${bits.join('')}</div>` : '';
  const slicePill = card.slice ? `<span class="item-slice">${card.slice}</span>` : '';
  const desc = card.desc ? `<div class="item-desc">${card.desc}</div>` : '';
  return `
    <div class="item">
      <div class="col-dot ${card.col}"></div>
      <div class="item-body">
        <div class="item-title">${slicePill}${card.title}</div>
        ${desc}
        ${metaLine}
      </div>
    </div>
  `;
}

function sessionRecapHTML(sess) {
  const testable = sess.testable && sess.testable.length
    ? `<div class="recap-block testable">
        <div class="rb-title">🧪 Ce que tu peux tester</div>
        <ul>${sess.testable.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>` : '';
  const shipped = sess.shipped
    ? `<div class="recap-block shipped">
        <div class="rb-title">🎯 Livré proprement</div>
        <p>${sess.shipped}</p>
      </div>` : '';
  const blocks = (testable || shipped)
    ? `<div class="recap-blocks">${testable}${shipped}</div>` : '';
  const shots = sess.screenshots && sess.screenshots.length
    ? `<h4><span class="h4-icon">📸</span>Screenshots<span class="h4-count">${sess.screenshots.length}</span></h4>
       <div class="screenshots-strip">
         ${sess.screenshots.map(s => `
           <div class="shot">
             <img src="${s.src}" alt="${s.cap}" onclick="openLightbox('${s.src}')" />
             <div class="cap">${s.cap}</div>
           </div>`).join('')}
       </div>` : '';
  return blocks + shots;
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
}
document.addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') e.target.classList.remove('open');
});

function renderBySession() {
  const container = document.getElementById('view-container');
  container.innerHTML = `<div class="grouped" id="grouped"></div>`;
  const grouped = document.getElementById('grouped');

  const sessionIds = Object.keys(SESSIONS).map(Number).sort((a, b) => b - a);

  // Bucket "hors session" (cards sans meta ou sans session)
  const orphanCards = DATA.cards.filter(c => !metaFor(c) || !metaFor(c).session);

  sessionIds.forEach(sid => {
    const sess = SESSIONS[sid];
    const sessCards = DATA.cards.filter(c => {
      const m = metaFor(c);
      return m && m.session === sid;
    });
    if (!sessCards.length && !sess.testable) return;

    // Group by theme within session
    const byTheme = {};
    sessCards.forEach(c => {
      const m = metaFor(c);
      const th = m.theme || 'core';
      (byTheme[th] = byTheme[th] || []).push(c);
    });

    const themeBlocks = Object.keys(THEMES)
      .filter(tk => byTheme[tk])
      .map(tk => {
        const th = THEMES[tk];
        const items = byTheme[tk].map(c => itemHTML(c, false)).join('');
        return `
          <h4><span class="h4-icon">${th.icon}</span>${th.label}<span class="h4-count">${byTheme[tk].length}</span></h4>
          <div class="item-list">${items}</div>
        `;
      }).join('');

    const themesPills = Object.keys(byTheme).map(tk => {
      const th = THEMES[tk];
      return `<span class="pill">${th.icon} ${th.label} <b>${byTheme[tk].length}</b></span>`;
    }).join('');

    const doneCount = sessCards.filter(c => c.col === 'done').length;
    const openCount = sessCards.filter(c => c.col === 'doing' || c.col === 'todo').length;
    const statusBadge = openCount === 0 && sessCards.length > 0
      ? '<span class="pill" style="background: rgba(110,220,155,0.25); color: #1B5E20;">🎉 Livrée</span>'
      : (openCount > 0 ? `<span class="pill" style="background: rgba(77,150,255,0.15); color: #1E40AF;">🔄 ${openCount} en cours</span>` : '');

    const card = document.createElement('div');
    card.className = 'group-card';
    // Default: open the latest session (sid === max)
    if (sid === Math.max(...sessionIds)) card.classList.add('open');
    card.innerHTML = `
      <div class="group-header">
        <span class="chev">▶</span>
        <div class="badge-emoji">📅</div>
        <div class="title-block">
          <div class="code">${sess.code} · ${sess.label}</div>
          <div class="subtitle">${formatDateFR(sess.date)} — ${sess.desc}</div>
        </div>
        <div class="stats-row">
          <span class="pill count">${sessCards.length} carte${sessCards.length > 1 ? 's' : ''}</span>
          ${doneCount ? `<span class="pill">✓ ${doneCount} livrée${doneCount > 1 ? 's' : ''}</span>` : ''}
          ${statusBadge}
          ${themesPills}
        </div>
      </div>
      <div class="group-body">
        <div class="group-body-inner">
          ${sessionRecapHTML(sess)}
          ${themeBlocks}
        </div>
      </div>
    `;
    card.querySelector('.group-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    grouped.appendChild(card);
  });

  // Orphan bucket at the end
  if (orphanCards.length) {
    const card = document.createElement('div');
    card.className = 'group-card';
    const byCol = {};
    orphanCards.forEach(c => { (byCol[c.col] = byCol[c.col] || []).push(c); });
    const colBlocks = Object.keys(byCol).map(col => {
      const items = byCol[col].map(c => itemHTML(c, false)).join('');
      const colDef = DATA.columns.find(x => x.key === col);
      return `
        <h4><span class="h4-icon">${colDef.title.split(' ')[0]}</span>${colDef.title.split(' ').slice(1).join(' ')}<span class="h4-count">${byCol[col].length}</span></h4>
        <div class="item-list">${items}</div>
      `;
    }).join('');
    card.innerHTML = `
      <div class="group-header">
        <span class="chev">▶</span>
        <div class="badge-emoji">🌐</div>
        <div class="title-block">
          <div class="code">Hors session · Backlog & Submit</div>
          <div class="subtitle">Tâches à venir sans session assignée (TODO / BLOCKED / SUBMIT)</div>
        </div>
        <div class="stats-row">
          <span class="pill count">${orphanCards.length} tâches</span>
        </div>
      </div>
      <div class="group-body"><div class="group-body-inner">${colBlocks}</div></div>
    `;
    card.querySelector('.group-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    grouped.appendChild(card);
  }
}

// =========================================================================
// VIEW BY THEME
// =========================================================================
function renderByTheme() {
  const container = document.getElementById('view-container');
  container.innerHTML = `<div class="grouped" id="grouped"></div>`;
  const grouped = document.getElementById('grouped');

  const themeKeys = Object.keys(THEMES);
  const orphanCards = DATA.cards.filter(c => !metaFor(c) || !metaFor(c).theme);

  themeKeys.forEach(tk => {
    const th = THEMES[tk];
    const themeCards = DATA.cards.filter(c => {
      const m = metaFor(c);
      return m && m.theme === tk;
    });
    if (!themeCards.length) return;

    // Group by session within theme
    const bySess = {};
    themeCards.forEach(c => {
      const m = metaFor(c);
      const s = m.session || 0;
      (bySess[s] = bySess[s] || []).push(c);
    });

    const sessBlocks = Object.keys(bySess)
      .map(Number)
      .sort((a, b) => b - a)
      .map(sid => {
        const sess = SESSIONS[sid];
        const items = bySess[sid].map(c => itemHTML(c, true)).join('');
        const header = sess
          ? `${sess.code} · ${sess.label} <span style="color: var(--muted); font-weight: 600;">(${formatDateFR(sess.date)})</span>`
          : 'Sans session';
        return `
          <h4><span class="h4-icon">📅</span>${header}<span class="h4-count">${bySess[sid].length}</span></h4>
          <div class="item-list">${items}</div>
        `;
      }).join('');

    const doneCount = themeCards.filter(c => c.col === 'done').length;
    const sessCount = Object.keys(bySess).filter(k => Number(k) > 0).length;

    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">
        <span class="chev">▶</span>
        <div class="badge-emoji">${th.icon}</div>
        <div class="title-block">
          <div class="code">${th.label}</div>
          <div class="subtitle">${th.desc}</div>
        </div>
        <div class="stats-row">
          <span class="pill count">${themeCards.length} carte${themeCards.length > 1 ? 's' : ''}</span>
          ${doneCount ? `<span class="pill">✓ ${doneCount} livrée${doneCount > 1 ? 's' : ''}</span>` : ''}
          <span class="pill">📅 ${sessCount} session${sessCount > 1 ? 's' : ''}</span>
        </div>
      </div>
      <div class="group-body">
        <div class="group-body-inner">${sessBlocks}</div>
      </div>
    `;
    card.querySelector('.group-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    grouped.appendChild(card);
  });

  // Orphan bucket
  if (orphanCards.length) {
    const card = document.createElement('div');
    card.className = 'group-card';
    const items = orphanCards.map(c => itemHTML(c, true)).join('');
    card.innerHTML = `
      <div class="group-header">
        <span class="chev">▶</span>
        <div class="badge-emoji">🌐</div>
        <div class="title-block">
          <div class="code">Non catégorisé</div>
          <div class="subtitle">Tâches sans thème assigné (backlog + submit)</div>
        </div>
        <div class="stats-row">
          <span class="pill count">${orphanCards.length} tâches</span>
        </div>
      </div>
      <div class="group-body">
        <div class="group-body-inner">
          <div class="item-list">${items}</div>
        </div>
      </div>
    `;
    card.querySelector('.group-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
    grouped.appendChild(card);
  }
}

// =========================================================================
// STATS + view switching
// =========================================================================
function updateStats() {
  const counts = { todo: 0, doing: 0, blocked: 0, done: 0, submit: 0 };
  DATA.cards.forEach(c => { counts[c.col] = (counts[c.col] || 0) + 1; });
  document.getElementById('count-todo').textContent = counts.todo;
  document.getElementById('count-doing').textContent = counts.doing;
  document.getElementById('count-blocked').textContent = counts.blocked;
  document.getElementById('count-done').textContent = counts.done;
  const total = counts.todo + counts.doing + counts.blocked + counts.done;
  const pct = total ? Math.round((counts.done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `Progression globale : ${pct}% (${counts.done}/${total} tâches hors submit-final)`;
  document.getElementById('gen-date').textContent = new Date().toLocaleString('fr-FR');
}

function renderCurrentHero() {
  const slot = document.getElementById('current-hero-slot');
  const sessionIds = Object.keys(SESSIONS).map(Number).sort((a, b) => b - a);

  // Détecter "session en cours" : d'abord la session la plus récente avec des DOING,
  // sinon la session la plus récente (aujourd'hui).
  let currentId = null;
  for (const sid of sessionIds) {
    const hasDoing = DATA.cards.some(c => {
      const m = metaFor(c);
      return c.col === 'doing' && m && m.session === sid;
    });
    if (hasDoing) { currentId = sid; break; }
  }
  const isOngoing = currentId !== null;
  if (!currentId) currentId = sessionIds[0];

  const sess = SESSIONS[currentId];
  const sessCards = DATA.cards.filter(c => {
    const m = metaFor(c);
    return m && m.session === currentId;
  });
  const doingCards = sessCards.filter(c => c.col === 'doing');
  const todoInSess = sessCards.filter(c => c.col === 'todo');
  const doneInSess = sessCards.filter(c => c.col === 'done');

  // Cross-session DOING (items that trail from earlier sessions)
  const allDoing = DATA.cards.filter(c => c.col === 'doing');

  const chipsHTML = allDoing.length
    ? allDoing.slice(0, 6).map(c => {
        const m = metaFor(c);
        const sPill = m && m.session ? `${SESSIONS[m.session].code}·` : '';
        return `<span class="chip"><span class="dot doing"></span>${sPill} ${c.slice ? c.slice + ' — ' : ''}${c.title.replace(/^[✅🎯⭐↩️✨]\s*/, '').slice(0, 60)}</span>`;
      }).join('')
    : `<span class="chip"><span class="dot todo"></span>Aucun DOING actif — prêt à démarrer le prochain slice</span>`;

  const eyebrow = isOngoing
    ? `<span class="live-dot"></span> Session en cours · ${sess.code}`
    : `📅 Dernière session · ${sess.code}`;

  slot.innerHTML = `
    <div class="current-hero">
      <div class="hero-emoji">${isOngoing ? '🔄' : '📚'}</div>
      <div class="hero-body">
        <div class="hero-eyebrow">${eyebrow}</div>
        <div class="hero-title">${sess.label}</div>
        <div class="hero-sub">${formatDateFR(sess.date)} — ${sess.desc}</div>
        <div class="hero-chips">${chipsHTML}</div>
      </div>
      <div class="hero-stats">
        <div class="big">${doneInSess.length}<span style="font-size:20px;color:var(--muted)">/${sessCards.length}</span></div>
        <div class="lbl">Livrées</div>
        ${doingCards.length ? `<div style="margin-top:6px;font-family:'Nunito';font-size:12px;color:var(--blue);font-weight:700">🚀 ${doingCards.length} DOING</div>` : ''}
        ${todoInSess.length ? `<div style="font-family:'Nunito';font-size:12px;color:var(--muted);font-weight:700">📋 ${todoInSess.length} TODO</div>` : ''}
      </div>
    </div>
  `;
}

const VIEW_RENDERERS = {
  session: renderBySession,
  theme: renderByTheme,
  status: renderByStatus,
};

function switchView(mode) {
  document.querySelectorAll('.view-selector button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });
  VIEW_RENDERERS[mode]();
}

document.querySelectorAll('.view-selector button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

updateStats();
renderCurrentHero();
switchView('session');
</script>
</body>
</html>
